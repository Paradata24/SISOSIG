# Sammelt alle 10 Minuten die aktuellen Windwerte aller Südtiroler
# Stationen und schreibt sie in die Supabase-Tabelle wind_measurements.
# Hinweis: GitHub führt Zeitpläne nur auf dem main-Branch aus, und die
# tatsächliche Startzeit kann sich bei hoher Auslastung um einige Minuten
# verschieben — für eine Wind-Historie ist das unkritisch.
name: Winddaten sammeln

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: # erlaubt manuelles Starten über den Actions-Tab

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Winddaten sammeln und in Supabase speichern
        run: node scripts/collect-wind.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
